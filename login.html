<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EWI - ALTINBAS | Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.top-bar {
  background: #4a5878;
  padding: 12px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.top-bar img { height: 36px; }
.top-bar span { color: #fff; font-size: 0.85rem; opacity: 0.8; }
.main-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
  background: linear-gradient(160deg, #4a5878 0%, #8690a7 60%, #f0f2f5 100%);
}
.login-box {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  width: 100%;
  max-width: 400px;
  overflow: hidden;
}
.login-header {
  background: #4a5878;
  padding: 28px 32px 22px;
  text-align: center;
}
.login-header h2 {
  color: #fff;
  font-size: 1.3rem;
  font-weight: 700;
  margin: 0 0 4px;
  letter-spacing: 1px;
}
.login-header p {
  color: rgba(255,255,255,0.7);
  font-size: 0.82rem;
  margin: 0;
}
.login-body { padding: 32px; }
.form-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: #4a5878;
  margin-bottom: 5px;
  display: block;
}
.input-wrap {
  position: relative;
  margin-bottom: 18px;
}
.input-wrap .material-icons-outlined {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: #8690a7;
  font-size: 18px;
  pointer-events: none;
}
.input-wrap input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border: 1.5px solid #d0d5e0;
  border-radius: 5px;
  font-size: 0.93rem;
  color: #333;
  outline: none;
  transition: border-color 0.2s;
  background: #f8f9fb;
}
.input-wrap input:focus {
  border-color: #4a5878;
  background: #fff;
}
.btn-signin {
  width: 100%;
  background: #4a5878;
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 11px;
  font-size: 0.97rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: background 0.2s;
  margin-top: 4px;
}
.btn-signin:hover { background: #3a4668; }
.error-alert {
  background: #fff3f3;
  border: 1px solid #f5c2c2;
  color: #b00020;
  border-radius: 5px;
  padding: 9px 13px;
  font-size: 0.84rem;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  gap: 7px;
}
.error-alert .material-icons-outlined { font-size: 16px; }
.divider {
  text-align: center;
  color: #aaa;
  font-size: 0.78rem;
  margin: 18px 0 14px;
  position: relative;
}
.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 38%;
  height: 1px;
  background: #e0e0e0;
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.footer-bar {
  background: #4a5878;
  color: rgba(255,255,255,0.6);
  text-align: center;
  font-size: 0.78rem;
  padding: 12px;
}
.footer-bar a { color: rgba(255,255,255,0.8); text-decoration: none; }
</style>
</head>
<body>

<div class="top-bar">
  <img src="images/home_image_0.png" alt="Altinbas Logo" onerror="this.style.display='none';this.nextSibling.style.display='block'">
  <span style="display:none;color:#fff;font-weight:700;font-size:1.1rem;">ALTINBAS</span>
  <span>Student Information System</span>
</div>

<div class="main-wrap">
  <div class="login-box">
    <div class="login-header">
      <h2>EWI — ALTINBAS</h2>
      <p>Please sign in with your student credentials</p>
    </div>
    <div class="login-body">
      <div class="error-alert" id="errorAlert">
        <i class="material-icons-outlined">error_outline</i>
        Invalid Student ID or password.
      </div>

      <label class="form-label">Student ID</label>
      <div class="input-wrap">
        <i class="material-icons-outlined">badge</i>
        <input type="text" id="studentId" placeholder="e.g. 220513095" autocomplete="off">
      </div>

      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="material-icons-outlined">lock_outline</i>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button class="btn-signin" onclick="doLogin()">Sign In</button>

      <div class="divider">Altınbaş University</div>
      <div style="text-align:center;font-size:0.8rem;color:#999;">
        For support contact <a href="#" style="color:#4a5878;">IT Help Desk</a>
      </div>
    </div>
  </div>
</div>

<div class="footer-bar">
  <a href="#">EWI - ALTINBAS</a> &copy; 2026 &nbsp;|&nbsp; Altınbaş University
</div>

<script>
  if (sessionStorage.getItem('ewi_auth') === 'true') {
    window.location.href = 'home.html';
  }

  function doLogin() {
    var id = document.getElementById('studentId').value.trim();
    var pw = document.getElementById('password').value;
    var err = document.getElementById('errorAlert');
    if (id === '220513095' && pw === 'Mm-11332244') {
      sessionStorage.setItem('ewi_auth', 'true');
      window.location.href = 'home.html';
    } else {
      err.style.display = 'flex';
      document.getElementById('password').value = '';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
